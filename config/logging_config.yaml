# Logging Configuration
# Python logging dict-config format.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(module)s %(funcName)s %(lineno)d %(message)s"

  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d) %(funcName)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/application.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf-8

  json_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/application.json
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  src:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false

  src.lambda_functions:
    level: INFO
    handlers: [console, json_file, error_file]
    propagate: false

  src.ml_models:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  src.document_processing:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  src.database:
    level: WARNING
    handlers: [console, file, error_file]
    propagate: false

  sqlalchemy.engine:
    level: WARNING
    handlers: [file]
    propagate: false

  boto3:
    level: WARNING
    handlers: [file]
    propagate: false

  botocore:
    level: WARNING
    handlers: [file]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]

# Environment-specific overrides
environments:
  development:
    root_level: DEBUG
    sqlalchemy_level: INFO   # see SQL queries in dev
  staging:
    root_level: INFO
  production:
    root_level: WARNING
    handlers: [json_file, error_file]  # JSON-only in prod
