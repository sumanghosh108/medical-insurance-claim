name: Performance Tests

on:
  schedule:
    - cron: "0 2 * * 3"  # Wednesdays at 2 AM UTC
  workflow_dispatch:
    inputs:
      users:
        description: Number of concurrent users
        required: false
        default: "50"
      duration:
        description: Test duration (e.g. 5m, 10m)
        required: false
        default: "5m"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: claims_db_perf
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Start API server
        run: |
          DATABASE_URL=postgresql://postgres:testpass@localhost:5432/claims_db_perf \
          uvicorn src.api:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Locust load test
        run: |
          locust -f tests/load/locustfile.py \
            --host http://localhost:8000 \
            --users ${{ github.event.inputs.users || '50' }} \
            --spawn-rate 5 \
            --run-time ${{ github.event.inputs.duration || '5m' }} \
            --headless \
            --csv=reports/load_test \
            --html=reports/load_test_report.html

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: reports/

  benchmark:
    name: ML Model Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run model benchmarks
        run: |
          python -c "
          import time
          import numpy as np
          import pandas as pd
          from src.ml_models.fraud_detection import FraudDetectionEnsemble
          from src.ml_models.feature_engineering import build_feature_engineer

          np.random.seed(42)
          n = 1000
          X = pd.DataFrame({
              'claim_amount': np.random.uniform(1000, 50000, n),
              'missing_fields': np.random.randint(0, 3, n),
              'bill_treatment_mismatch': np.random.randint(0, 2, n),
              'duplicate_invoice': np.random.randint(0, 2, n),
          })
          y = pd.Series(np.random.binomial(1, 0.05, n))

          model = FraudDetectionEnsemble()
          start = time.time()
          model.train(X, y)
          train_time = time.time() - start

          start = time.time()
          for _ in range(100):
              model.predict(X.iloc[:10])
          predict_time = (time.time() - start) / 100

          print(f'Training time: {train_time:.2f}s')
          print(f'Avg prediction time (10 records): {predict_time*1000:.1f}ms')
          assert predict_time < 1.0, f'Prediction too slow: {predict_time:.2f}s'
          "
