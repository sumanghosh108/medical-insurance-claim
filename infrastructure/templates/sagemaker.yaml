AWSTemplateFormatVersion: "2010-09-09"
Description: SageMaker model endpoint and training resources.

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  SageMakerInstanceType:
    Type: String
    Default: ml.c5.2xlarge

Resources:
  SageMakerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sagemaker-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-models-${Environment}"
                  - !Sub "arn:aws:s3:::${ProjectName}-models-${Environment}/*"

  FraudDetectionModel:
    Type: AWS::SageMaker::Model
    Properties:
      ModelName: !Sub "${ProjectName}-fraud-model-${Environment}"
      ExecutionRoleArn: !GetAtt SageMakerRole.Arn
      PrimaryContainer:
        Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/sklearn-inference:latest"
        ModelDataUrl: !Sub "s3://${ProjectName}-models-${Environment}/models/fraud/v2.1.0.tar.gz"

  EndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName: !Sub "${ProjectName}-fraud-config-${Environment}"
      ProductionVariants:
        - VariantName: primary
          ModelName: !Ref FraudDetectionModel
          InstanceType: !Ref SageMakerInstanceType
          InitialInstanceCount: !If [IsProd, 2, 1]
          InitialVariantWeight: 1.0
      DataCaptureConfig:
        EnableCapture: true
        InitialSamplingPercentage: 10
        DestinationS3Uri: !Sub "s3://${ProjectName}-models-${Environment}/data-capture/"
        CaptureOptions:
          - CaptureMode: Input
          - CaptureMode: Output

  Endpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub "fraud-detection-${Environment}"
      EndpointConfigName: !Ref EndpointConfig

  # Auto-scaling
  ScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 10
      MinCapacity: 2
      ResourceId: !Sub "endpoint/${Endpoint.EndpointName}/variant/primary"
      ScalableDimension: sagemaker:variant:DesiredInstanceCount
      ServiceNamespace: sagemaker

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: !Sub "${ProjectName}-fraud-scaling"
      ScalingTargetId: !Ref ScalingTarget
      PolicyType: TargetTrackingScaling
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: SageMakerVariantInvocationsPerInstance
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Conditions:
  IsProd: !Equals [!Ref Environment, production]

Outputs:
  EndpointName:
    Value: !GetAtt Endpoint.EndpointName
  ModelName:
    Value: !Ref FraudDetectionModel
