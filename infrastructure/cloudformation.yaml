AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Insurance Claims Processing Pipeline — Master Stack.
  Deploys VPC, Lambda, and monitoring via nested stacks.
  RDS and SageMaker disabled for free-tier accounts.

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues: [development, staging, production]
  ProjectName:
    Type: String
    Default: claims-processing
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
  LambdaMemorySize:
    Type: Number
    Default: 256
  LambdaTimeout:
    Type: Number
    Default: 300
  AlertEmail:
    Type: String
    Default: sum666504@gmail.com
  LambdaImageUri:
    Type: String
    Description: URI of the Docker image in ECR for heavy ML lambdas

Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/vpc.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcCidr: !Ref VpcCidr

  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/rds.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        RDSSecurityGroupId: !GetAtt VPCStack.Outputs.RDSSecurityGroupId
        LambdaSecurityGroupId: !GetAtt VPCStack.Outputs.LambdaSecurityGroupId

  LambdaStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - RDSStack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/lambda.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        LambdaSecurityGroupId: !GetAtt VPCStack.Outputs.LambdaSecurityGroupId
        LambdaMemorySize: !Ref LambdaMemorySize
        LambdaTimeout: !Ref LambdaTimeout
        RDSProxyEndpoint: !GetAtt RDSStack.Outputs.RDSProxyEndpoint
        RDSReadEndpoint: !GetAtt RDSStack.Outputs.RDSReadEndpoint
        LambdaImageUri: !Ref LambdaImageUri

  # NOTE: SageMaker stack disabled for free-tier deployments.
  # SageMakerStack:
  #   Type: AWS::CloudFormation::Stack
  #   ...

  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: LambdaStack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/monitoring.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        AlertsTopicArn: !GetAtt LambdaStack.Outputs.AlertsTopicArn
        AlertEmail: !Ref AlertEmail

  WorkflowStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: LambdaStack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/workflow.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        DocumentExtractionFunctionArn: !GetAtt LambdaStack.Outputs.DocumentExtractionFunctionArn
        EntityExtractionFunctionArn: !GetAtt LambdaStack.Outputs.EntityExtractionFunctionArn
        FraudDetectionFunctionArn: !GetAtt LambdaStack.Outputs.FraudDetectionFunctionArn
        WorkflowManagerFunctionArn: !GetAtt LambdaStack.Outputs.WorkflowManagerFunctionArn

Outputs:
  VpcId:
    Value: !GetAtt VPCStack.Outputs.VpcId
  ApiUrl:
    Value: !GetAtt LambdaStack.Outputs.ApiUrl
  DocumentsBucket:
    Value: !GetAtt LambdaStack.Outputs.DocumentsBucketName
  ClaimsTable:
    Value: !GetAtt LambdaStack.Outputs.ClaimsTableName
  StateMachineArn:
    Value: !GetAtt WorkflowStack.Outputs.StateMachineArn
  RDSProxyEndpoint:
    Description: Lambda functions connect through this proxy endpoint
    Value: !GetAtt RDSStack.Outputs.RDSProxyEndpoint
  RDSReadEndpoint:
    Description: Read Replica endpoint for read-heavy queries
    Value: !GetAtt RDSStack.Outputs.RDSEndpoint

