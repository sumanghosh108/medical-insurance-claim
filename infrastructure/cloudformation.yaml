AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Insurance Claims Processing Pipeline — Master Stack.
  Deploys VPC, RDS, Lambda, SageMaker, and monitoring via nested stacks.

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues: [development, staging, production]
  ProjectName:
    Type: String
    Default: claims-processing
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  DBAllocatedStorage:
    Type: Number
    Default: 20
  DBMasterPassword:
    Type: String
    NoEcho: true
    Default: CHANGE_ME_IN_PRODUCTION
  LambdaMemorySize:
    Type: Number
    Default: 256
  LambdaTimeout:
    Type: Number
    Default: 300
  AlertEmail:
    Type: String
    Default: sum666504@gmail.com

Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/vpc.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcCidr: !Ref VpcCidr

  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/rds.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        RDSSecurityGroupId: !GetAtt VPCStack.Outputs.RDSSecurityGroupId
        DBInstanceClass: !Ref DBInstanceClass
        DBAllocatedStorage: !Ref DBAllocatedStorage
        DBMasterPassword: !Ref DBMasterPassword

  LambdaStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [VPCStack, RDSStack]
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/lambda.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        PrivateSubnetIds: !GetAtt VPCStack.Outputs.PrivateSubnetIds
        RDSEndpoint: !GetAtt RDSStack.Outputs.RDSEndpoint
        LambdaSecurityGroupId: !GetAtt VPCStack.Outputs.LambdaSecurityGroupId
        LambdaMemorySize: !Ref LambdaMemorySize
        LambdaTimeout: !Ref LambdaTimeout

  # NOTE: SageMaker stack is disabled for free-tier deployments.
  # Uncomment when you have a trained model and ECR image ready.
  # SageMakerStack:
  #   Type: AWS::CloudFormation::Stack
  #   DependsOn: VPCStack
  #   Properties:
  #     TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/sagemaker.yaml"
  #     Parameters:
  #       Environment: !Ref Environment
  #       ProjectName: !Ref ProjectName

  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [LambdaStack, RDSStack]
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${ProjectName}-templates/templates/monitoring.yaml"
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        AlertsTopicArn: !GetAtt LambdaStack.Outputs.AlertsTopicArn
        AlertEmail: !Ref AlertEmail

Outputs:
  VpcId:
    Value: !GetAtt VPCStack.Outputs.VpcId
  RDSEndpoint:
    Value: !GetAtt RDSStack.Outputs.RDSEndpoint
  ApiUrl:
    Value: !GetAtt LambdaStack.Outputs.ApiUrl
